<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avatar TCG Tabletop Game - Manual</title>
<style>
body{margin:0;background:#0a0a0a;overflow:hidden;font-family:Georgia}
#tabletop{position:fixed;inset:0;}
#playmat{position:absolute;inset:0;background:url('https://github.com/zolodio/Avatar-TCG-Database/raw/main/PLMT001.jpg') center/contain no-repeat;}
#board{position:absolute;inset:0;}
.card{position:absolute;width:80px;height:112px;border-radius:8px;transform-style:preserve-3d;transition:.25s;cursor:grab;}
.card.dragging{z-index:999;cursor:grabbing;transition:none;}
.card:hover{transform:translateY(-6px) scale(1.05);}
.inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:.5s;}
.flipped .inner{transform:rotateY(180deg);}
.face,.back{position:absolute;inset:0;backface-visibility:hidden;}
.back{transform:rotateY(180deg);}
.sideways{transform:rotate(90deg)!important;}
.zone-label{position:absolute;color:white;font-weight:bold;text-shadow:1px 1px 3px #000;}
</style>
</head>
<body>
<div id="tabletop">
  <div id="playmat"></div>
  <div id="board"></div>
</div>
<script>
const IMG='https://raw.githubusercontent.com/zolodio/Avatar-TCG-Database/main/';
const BACK=IMG+'cardback.jpg';
function img(id){return IMG+id+'.jpg'}

/* ZONES: stacked vertically like a hamburger for manual gameplay */
const MAT={
  p1:{
    hand:{x:0.5,y:0.85},
    green:{x:0.3,y:0.65},
    yellow:{x:0.5,y:0.65},
    red:{x:0.7,y:0.65},
    deck:{x:0.92,y:0.78},
    discard:{x:0.92,y:0.6}
  }
};

/* DECK + DISCARD */
let deck=['AME063','AME065','AME068','AME070','AME074','AME077','AME078'];
let discard=[];

const board=document.getElementById('board');

/* CREATE CARD */
function makeCard(id,x,y,down=true){
 const el=document.createElement('div');
 el.className='card';
 el.style.left=x*innerWidth+'px';
 el.style.top=y*innerHeight+'px';
 el.innerHTML=`
  <div class="inner">
   <div class="face"><img src="${img(id)}" style="width:100%;height:100%"></div>
   <div class="back"><img src="${BACK}" style="width:100%;height:100%"></div>
  </div>`;
 if(down)el.classList.add('flipped');
 drag(el);
 board.appendChild(el);
 return el;
}

/* DRAG */
function drag(el){
 let ox,oy;
 el.onmousedown=e=>{
  el.classList.add('dragging'); ox=e.offsetX; oy=e.offsetY;
  document.onmousemove=m; document.onmouseup=u;
 };
 function m(e){ el.style.left=e.clientX-ox+'px'; el.style.top=e.clientY-oy+'px'; }
 function u(){ el.classList.remove('dragging'); snap(el); document.onmousemove=null; document.onmouseup=null; }
}

/* SNAP */
function snap(el){
 const zones=Object.values(MAT.p1);
 let best,dist=999999;
 zones.forEach(z=>{
  const dx=z.x*innerWidth-el.offsetLeft;
  const dy=z.y*innerHeight-el.offsetTop;
  const d=Math.hypot(dx,dy);
  if(d<dist){dist=d;best=z;}
 });
 el.style.left=best.x*innerWidth+'px';
 el.style.top=best.y*innerHeight+'px';
}

/* DRAW CARD MANUALLY */
function drawToZone(zone){
 if(deck.length===0)return alert('Deck empty!');
 const id=deck.shift();
 const c=makeCard(id,MAT.p1.deck.x,MAT.p1.deck.y,true);
 setTimeout(()=>{c.style.left=zone.x*innerWidth+'px';c.style.top=zone.y*innerHeight+'px';},50);
 setTimeout(()=>{c.classList.remove('flipped');},300);
 c.onclick=()=>{c.classList.toggle('sideways');}; // rotate for tapped/used
}

/* DISCARD MANUALLY */
function sendToDiscard(card){
 discard.push(card);
 card.style.left=MAT.p1.discard.x*innerWidth+'px';
 card.style.top=MAT.p1.discard.y*innerHeight+'px';
}

/* INIT */
function init(){
  // stack deck visually
  for(let i=0;i<5;i++){
    const c=makeCard('AME063',MAT.p1.deck.x,MAT.p1.deck.y,true);
    c.style.transform=`translateY(${i*-2}px)`;
  }
  // click deck to draw manually
  board.onclick=e=>{
    if(e.target.closest('.card'))return;
    drawToZone(MAT.p1.hand);
  };
}
init();
</script>
</body>
</html>
